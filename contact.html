<section class="glass-section">

<h2>Book A Table</h2>

<form id="bookingForm" class="contact-form">

<input
type="text"
id="name"
placeholder="Enter Your Name"
required>

<input
type="email"
id="email"
placeholder="Enter Your Email"
required>

<input
type="tel"
id="phone"
placeholder="Enter Phone Number"
required>

<input
type="date"
required>

<input
type="time"
required>

<input
type="number"
id="guests"
placeholder="Number of Guests"
required>

<textarea
rows="5"
placeholder="Special Request">
</textarea>

<button type="submit">

Book Table

</button>

</form>
