<!DOCTYPE html>

<section class="glass">

<h2>Book A Table</h2>

<form class="contact-form" id="bookingForm">

<input
type="text"
id="name"
placeholder="Your Name"
required>

<input
type="email"
id="email"
placeholder="Your Email"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="date"
required>

<input
type="time"
required>

<input
type="number"
placeholder="Number of Guests"
required>

<textarea
rows="5"
placeholder="Special Request">
</textarea>

<button type="submit">

Book Table

</button>

</form>

</section>

<footer>
<p>© 2026 Royal Gold Restaurant</p>
</footer>

<script src="js/script.js"></script>

<script>
const bookingForm =
document.getElementById("bookingForm");

bookingForm.addEventListener("submit",(e)=>{

e.preventDefault();

const name =
document.getElementById("name").value;

const email =
document.getElementById("email").value;

const phone =
document.getElementById("phone").value;

if(name===""){

alert("Enter your name");
return;

}

if(!email.includes("@")){

alert("Enter valid email");
return;

}

if(phone.length<10){

alert("Enter valid phone number");
return;

}

alert("Table Booked Successfully!");

bookingForm.reset();

});
</script>

</body>
</html>
